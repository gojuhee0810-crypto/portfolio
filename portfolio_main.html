<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jihye Yoon — Minimal Portfolio</title>
    <meta name="description" content="윤지혜 디자이너 포트폴리오. 디지털 경험을 디자인합니다.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 쨍한 라임그린 배경 */
            background-color: #B2FF33; 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 흰색 컨테이너 */
        .container {
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        /* ════════════════════════════════════
           LEFT: Contact & Download (Pill Buttons)
           ════════════════════════════════════ */
        .left-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 80px;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #dcdcdc;
            border-radius: 50px;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: 500;
            color: #777;
            background: transparent;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .pill-btn:hover {
            border-color: #111;
            color: #111;
            background: #fafafa;
            transform: translateX(4px);
        }

        /* ════════════════════════════════════
           RIGHT: Typography Showcase
           ════════════════════════════════════ */
        .right-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 80px;
            border-left: 1px solid #f0f0f0;
        }

        .typo-block {
            font-size: clamp(32px, 3vw, 52px);
            color: #a0a0a0;
            line-height: 1.5;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        .typo-block strong {
            font-weight: 500;
            color: #555;
        }

        .typo-block .highlight {
            background-color: #111;
            color: #ffffff; /* 혹은 레퍼런스처럼 강조 대비를 위해 흰색/검정 */
            padding: 0 12px;
            display: inline-block;
            font-weight: 500;
            line-height: 1.2;
            transform: translateY(-4px);
        }

        /* 반응형 */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
            }
            .left-col, .right-col {
                padding: 40px;
                border-left: none;
                align-items: center;
                text-align: center;
            }
            .right-col {
                border-top: 1px solid #f0f0f0;
            }
            .pill-btn {
                font-size: 16px;
                padding: 8px 24px;
            }
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .left-col, .right-col { padding: 32px 20px; }
            .typo-block { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 왼쪽: 둥근 알약 형태의 버튼들 (전화, 메일, 포트폴리오, 이력서) -->
        <div class="left-col">
            <div class="nav-list">
                <a href="https://github.com" target="_blank" class="pill-btn">GitHub</a>
                <a href="https://linkedin.com/in/jihyeyoon-pm" target="_blank" class="pill-btn">LinkedIn</a>
                <a href="#" onclick="alert('이력서 다운로드')" class="pill-btn">CV Download</a>
                <a href="#" onclick="alert('포트폴리오 다운로드')" class="pill-btn">Portfolio Download</a>
                <a href="tel:+821091723385" class="pill-btn">+82 10-9172-3385</a>
                <a href="mailto:jihye.yoon@gmail.com" class="pill-btn">jihye.yoon@gmail.com</a>
                <a href="mailto:jihye.yoon@gmail.com" class="pill-btn">Get in touch</a>
            </div>
        </div>

        <!-- 오른쪽: 디자이너 강점을 나타내는 타이포그래피 (레퍼런스 카피 반영) -->
        <div class="right-col">
            <div class="typo-block">
                I design digital experiences<br>
                interaction as <strong>data</strong><br>
                system as <span class="highlight">structure</span>
            </div>
        </div>

    </div>

</body>
</html>
